<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Board (Auth + Board + Comment)</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      form {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        align-items: start;
      }
      textarea {
        resize: none;
      }
    </style>
  </head>
  <body>
    <details>
      <summary>회원가입</summary>
      <form id="joinForm">
        <input
          name="join-email"
          type="email"
          placeholder="abc@abc.com"
          required
        />
        <input
          name="join-password"
          type="password"
          placeholder="6자리 이상"
          required
        />
        <button>가입</button>
      </form>
    </details>
    <details>
      <summary>로그인</summary>
      <form id="loginForm">
        <input
          name="login-email"
          type="email"
          placeholder="abc@abc.com"
          required
        />
        <input
          name="login-password"
          type="password"
          placeholder="6자리 이상"
          required
        />
        <button>로그인</button>
      </form>
    </details>
    <details>
      <summary>게시글 작성</summary>
      <form id="writeForm">
        <label>
          제목 :
          <input name="title" required />
        </label>
        <label>
          내용 :
          <textarea name="content" required></textarea>
        </label>
        <button>작성</button>
        <!-- createdAt, userId는 자동으로 들어갈 예정 -->
      </form>
    </details>
    <details open>
      <summary>게시글 목록</summary>
      <h1>게시글 목록</h1>
      <section id="postContainer"></section>
    </details>
    <script>
      //   console.log(window.supabase);
      const SUPABASE_URL = "https://rxtdfesljmaajkunksyz.supabase.co";
      const SUPABASE_PUB_KEY = "sb_publishable_Pd-Ro2zlkKTXzdtl-f4IYQ_CyKpuexK";
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUB_KEY);
      //   console.log(sb);

      const joinForm = document.querySelector("#joinForm");
      joinForm.addEventListener("submit", async (event) => {
        console.log("joinForm");
        event.preventDefault();
        const formData = new FormData(event.target);
        console.log(...formData);
        const email = formData.get("join-email");
        const password = formData.get("join-password");
        const { data, error } = await sb.auth.signUp({
          email,
          password,
        });
        console.log("data", data);
        console.log("error", error);
      });

      const loginForm = document.querySelector("#loginForm");
      loginForm.addEventListener("submit", async (event) => {
        console.log("loginForm");
        event.preventDefault();
        const formData = new FormData(event.target);
        console.log(...formData);
        const email = formData.get("login-email");
        const password = formData.get("login-password");
        const { data, error } = await sb.auth.signInWithPassword({
          email,
          password,
        });
        console.log("data", data);
        console.log("error", error);
        if (error) {
          console.log("로그인 에러 발생");
          return;
        }
        console.log("로그인 성공");
        // XSS 우려 있으나 개발 편의상 지금은 여기에 저장
        // 우리가 굳이 안해줘도 supabase sdk가 알아서 저장해주므로 sdk 사용시 안해도 된다
        // if (data.session.access_token) {
        //   console.log("토큰 감지");
        //   localStorage.setItem("sb_access_token", data.session.access_token);
        //   localStorage.setItem("sb_refresh_token", data.session.refresh_token);
        //   console.log("토큰 저장 완료");
        // }
      });

      const writeForm = document.querySelector("#writeForm");
      writeForm.addEventListener("submit", async (event) => {
        console.log("writeForm");
        event.preventDefault();
        const formData = new FormData(event.target);
        console.log(...formData);
        const title = formData.get("title");
        const content = formData.get("content");
        const { data, error } = await sb
          .from("posts")
          .insert([{ title, content }]);
        // 아직 select 권한이 없음.
        if (error) console.log("error", error);
        // console.log("data", data);
        await renderPosts();
      });

      const postContainer = document.querySelector("#postContainer");
      document.addEventListener("DOMContentLoaded", async () => {
        console.log("DOMContentLoaded");
        await renderPosts();
        console.log("화면 렌더링 완료");
      });

      async function renderPosts() {
        const { data, error } = await sb.from("posts").select("*");
        // Policy 아직 없음 -> 정책 추가
        if (error) console.log("error", error);
        console.log("data", data);
        postContainer.innerHTML = "";
        for (const v of data) {
          console.log(v);
          const post = document.createElement("div");
          // TODO : 과제(?) - user_id(uuid) => user email을 표시하게
          post.innerHTML = `
                <h3>${v.title}</h3>
                <p>
                    <code>작성자 : ${v.user_id}</code> <br />
                    <code>작성일시 ${v.created_at}</code>
                </p>
                <p>${v.content}</p>
            `;
          postContainer.append(post);
        }
      }
    </script>
  </body>
</html>
